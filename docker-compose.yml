services:
  postgres:
    image: postgres:16-alpine
    container_name: deutsch-learner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deutsch_learner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deutsch_learner"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deutsch-learner-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    profiles: ["app"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deutsch-learner-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_PORT: 8080
      DATA_BACKEND: postgres
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/deutsch_learner?sslmode=disable
      REDIS_ADDR: redis:6379
      CORS_ALLOWED_ORIGINS: http://localhost:4173,http://127.0.0.1:4173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

  frontend:
    profiles: ["app"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deutsch-learner-frontend
    restart: unless-stopped
    environment:
      PUBLIC_API_BASE_URL: http://backend:8080
      PUBLIC_USER_ID: 11111111-1111-1111-1111-111111111111
    ports:
      - "4173:4173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173/resources || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
