name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-build-vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Install C Compiler (for race tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Download modules
        run: go mod download

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run unit tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Run build
        run: go build ./...

      - name: Run race tests
        env:
          CGO_ENABLED: 1
        run: go test -race ./...
