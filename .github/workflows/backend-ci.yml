name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-build-vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Install C Compiler (for race tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Download modules
        run: go mod download

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run unit tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Run build
        run: go build ./...

      - name: Run race tests
        env:
          CGO_ENABLED: 1
        run: go test -race ./...

  integration-postgres:
    runs-on: ubuntu-latest
    needs: test-build-vet
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: deutsch_learner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deutsch_learner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run migrations
        env:
          POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/deutsch_learner?sslmode=disable
        run: go run ./cmd/migrate

      - name: Run seed
        env:
          POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/deutsch_learner?sslmode=disable
        run: go run ./cmd/seed

      - name: Run Postgres integration tests
        env:
          TEST_POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/deutsch_learner?sslmode=disable
        run: go test -tags=integration ./internal/infrastructure/postgres
